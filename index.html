<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dash Cam Tip Submitter</title>
  </head>
  <body>
    <h1>Dash Cam Tip Submitter</h1>
    <form id="incidentForm">
      <label for="incidentType">Incident Type</label>
      <select id="incidentType" name="incidentType" required>
        <option value="">-- Select --</option>
        <option value="Traffic Accident">Traffic Accident</option>
        <option value="Unsafe Driving">Unsafe Driving</option>
        <option value="Theft">Theft</option>
        <option value="Vandalism">Vandalism</option>
        <option value="Hit and Run">Hit and Run</option>
        <option value="Other">Other</option>
      </select>

      <br /><br />

      <label for="incidentDate">Incident Date</label>
      <input type="date" id="incidentDate" name="incidentDate" required />

      <br /><br />

      <label for="incidentTime">Incident Time</label>
      <input type="time" id="incidentTime" name="incidentTime" required />

      <br /><br />

      <label for="incidentLocation">City / Street Address</label>
      <input
        type="text"
        id="incidentLocation"
        name="incidentLocation"
        placeholder="e.g. Main St & 5th Ave, San Jose"
        required
      />

      <br /><br />

      <label for="incidentZip">ZIP Code</label>
      <input
        type="text"
        id="incidentZip"
        name="incidentZip"
        placeholder="e.g. 95112"
        pattern="[0-9]{5}"
        maxlength="5"
        required
      />

      <br /><br />

      <label for="incidentDescription">Description (optional)</label>
      <br />
      <textarea
        id="incidentDescription"
        name="incidentDescription"
        rows="4"
        maxlength="500"
        placeholder="Briefly describe what happened..."
      ></textarea>

      <br /><br />

      <label for="reporterName">Your Name</label>
      <input type="text" id="reporterName" name="reporterName" required />

      <br /><br />

      <label for="reporterEmail">Your Email</label>
      <input type="email" id="reporterEmail" name="reporterEmail" required />

      <br /><br />

      <label for="reporterPhone">Your Phone (optional)</label>
      <input type="tel" id="reporterPhone" name="reporterPhone" />

      <br /><br />

      <label for="videoFile">Dash Cam Video File</label>
      <br />
      <input type="file" id="videoFile" name="videoFile" accept="video/*" />

      <br /><br />

      <label for="consent">
        <input type="checkbox" id="consent" name="consent" required />
        I confirm I captured or have rights to this footage, and the
        information provided is accurate to the best of my knowledge.
      </label>

      <br /><br />

      <button type="submit">Prepare My Report</button>
    </form>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
